services:
  - type: web
    name: mountain-crown
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/hotel.db
    disk:
      name: hotel-db
      mountPath: /data
      sizeGB: 1
